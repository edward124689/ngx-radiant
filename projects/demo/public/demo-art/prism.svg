<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Prism abstract lightbox demo image</title>
  <desc id="desc">Floating radiant prism glass shapes on midnight blue.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0" stop-color="#312e81"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </radialGradient>
    <linearGradient id="p1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#8b5cf6" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#f472b6" stop-opacity="0.82"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="260" cy="220" r="130" fill="#22d3ee" opacity="0.18" filter="url(#blur)"/>
  <circle cx="910" cy="670" r="190" fill="#a855f7" opacity="0.18" filter="url(#blur)"/>
  <g stroke="#fff" stroke-opacity="0.2" stroke-width="2">
    <path d="M570 110 890 300 830 690 470 780 290 410 Z" fill="url(#p1)" opacity="0.82"/>
    <path d="M570 110 610 470 890 300" fill="#67e8f9" opacity="0.2"/>
    <path d="M610 470 830 690 470 780" fill="#f472b6" opacity="0.2"/>
    <path d="M610 470 290 410 570 110" fill="#c084fc" opacity="0.2"/>
  </g>
  <g fill="none" stroke="#67e8f9" stroke-opacity="0.32">
    <circle cx="600" cy="450" r="330"/>
    <circle cx="600" cy="450" r="230"/>
    <circle cx="600" cy="450" r="130"/>
  </g>
</svg>
